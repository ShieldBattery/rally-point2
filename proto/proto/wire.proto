syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
// buf:lint:ignore PACKAGE_VERSION_SUFFIX
package rally_point.wire;

// One QUIC datagram's worth on a single link (client <-> relay or relay <-> relay).
// Carries redundant payloads plus the ack state for the peer's packets on this
// link. Recovery is app-level, not QUIC's: unacked payloads are repacked into
// later packets until a packet carrying them is acked.
//
// netcode v2 replaces Storm's UDP transport wholesale (Seq1/Seq2/resend/checksum
// are gone, not tunneled): the game hooks at the turn/command layer, so these
// fields + QUIC take over sequencing, acks, integrity, and recovery. Datagrams
// carry the command stream — both lobby and in-game commands behave the same way
// (sequence-ordered, lockstep). Truly reliable side-channels (chat, resync, and
// possibly lobby setup) ride reliable QUIC streams with their own schema.
message Packet {
  // This packet's sequence number on this link. Resets each QUIC connection
  // (which is per-game), so the magnitude stays small.
  uint32 seq = 1;

  // The seq of the most recent packet seen from the peer on this link. Absent
  // until at least one packet has been received from the peer.
  optional uint32 ack = 2;

  // Bitfield of older acked packets: if bit N is set, packet (ack - N - 1) has
  // been received. Only meaningful when `ack` is present.
  fixed32 ack_bits = 3;

  // The freshly-produced payload plus redundant still-unacked ones. Empty for an
  // ack-only packet (one sent purely to carry acks).
  repeated Payload payloads = 4;
}

// One mesh datagram on a relay ↔ relay link. A relay-pair shares one QUIC
// connection across every game both relays jointly serve, so each datagram
// names the session it belongs to; the peer demultiplexes to that session's
// per-session transport state (its own AckManager + Dedup). The per-link
// transport runs unchanged per session — the origin `(slot, seq)` identity is
// unambiguous within a session's instance, so no key grows to include the
// session.
//
// Kept a distinct message from `Packet` (not an optional field on it) so the
// client edge, which carries one game per connection by nature, has no
// `session` field to set or mis-set: a client crate that never references
// `MeshPacket` cannot produce one. Client ↔ relay datagrams are `Packet`;
// relay ↔ relay datagrams are `MeshPacket`.
//
// `conditions` is an optional sidecar carrying the sender relay's home-client
// link stats to the peer relay, so the latency-buffer decision-maker can see
// the whole game's network conditions. It rides at the envelope level — never
// inside a `Payload` — because conditions are per-link and per-moment: a
// redundantly re-carried payload would carry stale conditions, but a fresh
// envelope sample is always current. Absent on ack-only flushes (no turn to
// attach fresh conditions to is the common case, and reserving room for it
// would steal redundancy budget — the protocol's whole point). A proto3
// optional field is wire-compatible with a `1` peer that does not know it, so
// the mesh ALPN does not bump for this addition.
message MeshPacket {
  // The game this datagram belongs to, scoped within the tenant the mesh link
  // authenticated for. A `0` is malformed and rejected by the reader (sessions
  // are 1-indexed), so the field is effectively required despite proto3 having
  // no `required` keyword. Carried as a `uint64` to match `SessionId` in the
  // domain types (which the token also carries as a u64); varint encoding keeps
  // a small session id the same width as a `uint32`, so there is no per-datagram
  // cost in practice.
  uint64 session = 1;

  // The per-link transport packet for this session, unchanged from the
  // client-edge framing. The mesh wraps it; it does not alter it.
  Packet packet = 2;

  // Per-client network conditions the sender relay observed on its own home
  // clients this datagram, for the latency-buffer decision-maker. Absent
  // when the sender has nothing to report (an ack-only flush, or no local
  // clients). See `LinkConditions`.
  optional LinkConditions conditions = 3;
}

// Per-client network conditions a relay gathered from its own home-client QUIC
// connections, attached to each mesh datagram it forwards so the peer relay —
// and ultimately the priority-ordered decision-maker — sees the whole game's
// network picture. Each relay directly observes only its own home clients'
// links (loss, RTT), so those stats travel with the turns across the mesh.
//
// This is the data the latency-buffer control law decides on: loss rate and
// latency per client, combined into a game-wide view by the decision-maker
// relay. The fields are cumulative counters the decision-maker differences
// between consecutive samples (a delta gives the loss rate over that interval),
// plus an instantaneous RTT — mirroring what QUIC measures per connection.
message LinkConditions {
  // One entry per home client (slot) the sender relay serves for this session.
  // Only the sender's own slots appear — a relay reports its local clients'
  // links, not conditions it received from other peers (those ride their own
  // origin relay's datagrams). Repeated rather than a map because slot counts
  // are tiny (≤8) and a scan is cheaper than hashing.
  repeated SlotConditions slots = 1;
}

// One home client's link conditions, as the relay's QUIC stack observes them.
message SlotConditions {
  // The slot these conditions belong to. Matches the `slot` on each `Payload`,
  // so the decision-maker attributes loss/latency to the right player.
  uint32 slot = 1;

  // The connection's smoothed round-trip time in microseconds. QUIC's path
  // estimator already de-noises this, so it is directly usable. A relay with no
  // recent RTT sample (a one-way sender that has received nothing back yet)
  // sends 0, which the decision-maker reads as "no measurement," not "zero
  // latency."
  uint32 rtt_us = 2;

  // Packets QUIC declared lost on this connection since the start (cumulative).
  // The decision-maker differences consecutive samples to get a loss rate over
  // the interval between them; a cumulative counter is idempotent under
  // re-delivery (a late conditions sample can't under-count).
  uint64 lost_packets = 3;

  // Packets sent on this connection since the start (cumulative) — the
  // denominator for the loss rate. Paired with `lost_packets` so the
  // decision-maker computes `lost/sent` over the delta, never relying on a
  // separately-sampled denominator that could mismatch the numerator's window.
  uint64 sent_packets = 4;
}

// One command packet from one slot — a unit of the lockstep command stream,
// mirroring Storm's native model (a per-peer sequence that ticks upward; a peer
// missing a seq stops and waits for it, which our redundancy/ack accelerates).
//
// `(slot, seq)`, not a game-frame number, is the dedup/retirement identity: each
// slot carries its own monotonic seq space starting at 0 (two slots both have a
// seq 0), so seq alone never identifies a turn. Storm itself keys on a per-peer
// seq; frames don't advance during a pause; lobby commands have no frame at all;
// and a fan-out link muxes multiple slots.
message Payload {
  // Monotonic per-slot origin seq — the turn's transport identity, assigned once
  // by the sending client and preserved end-to-end across every hop (never
  // restamped per link). Independent of game state. Stays below 2^63 (the sequence
  // buffer reserves the top bit).
  uint64 seq = 1;

  // The slot these commands belong to. The relay binds it to the sender's token
  // slot on ingress and does not trust a client-sent value; a relay -> client
  // fan-out packet may mux several slots.
  uint32 slot = 2;

  // Native SC:R command-stream bytes (lobby or in-game). The relay parses and
  // bounds-checks these against the command-length table but forwards the
  // bytes verbatim.
  bytes commands = 3;

  // The SC:R game frame these commands belong to — the runtime consensus
  // coordinate, not a transport identity. This is what latency-buffer and
  // player-leave decisions key on so every client applies them at the same
  // simulated step, and what the flight recorder tags turns by. It is carried
  // here as an annotation and the transport ignores it for delivery, dedup, and
  // retirement — those key on (slot, seq), above. The relay preserves it
  // verbatim across the seam, like seq: a forwarded turn carries the sender's
  // frame, never a relay-stamped one.
  //
  // Absent on payloads that are not for a specific simulation step — lobby
  // commands have no frame, and a 0 is a valid in-game frame, so the field is
  // optional rather than defaulting to 0. The consensus engine and flight
  // recorder treat a missing frame as "no consensus coordinate" (lobby turns
  // don't participate in apply-at-turn-N decisions).
  optional uint32 game_frame_count = 4;

  // A latency-buffer change the decision-making relay is broadcasting, if this
  // forwarded turn carries one. The relay that holds buffer authority stamps
  // this onto every turn it forwards until the whole session has passed the
  // directive's apply frame, so the instruction reaches every client riding the
  // turn stream they already receive — a client never gets its own turns back,
  // so it picks the change up off a peer's turn, and a client whose turns
  // aren't flowing yet is covered because the game (and so the apply frame)
  // can't advance without it. It is envelope metadata, never part of
  // `commands`: the game applies it outside command processing, so the SC:R
  // command bytes stay exactly what the sending client produced. The transport
  // ignores it for delivery, dedup, and retirement — the carrying turn is
  // deduped by (slot, seq) as usual, and the directive rides along for the
  // ride. A relay that is not the authority forwards an incoming stamp
  // untouched; only the authority ever sets or replaces this field.
  //
  // Idempotent by design: copies of the same directive (a re-stamped turn, a
  // redundant re-carry, a second mesh path) all carry the same `decision_seq`,
  // and a client keeps only the highest `decision_seq` it has seen. Absent
  // outside the window between a decision and its apply frame — the vast
  // majority of turns.
  optional BufferDirective buffer_directive = 5;

  // NOTE: player-leaves are deliberately NOT on the turn envelope. A drop stalls
  // every remaining player (lockstep), which stops the turn stream — so an
  // envelope stamp could never be delivered when it is needed. Leaves ride the
  // reliable control stream instead (see `ControlFrame.leave_directive`). The
  // buffer directive keeps the envelope because buffer changes happen while turns
  // are still flowing.
}

// One message on the client ↔ relay reliable control stream — the channel for
// what the datagram path deliberately cannot carry. Each side opens one
// bidirectional QUIC stream after the auth handshake and writes length-prefixed
// `ControlFrame`s on it (see `proto::control_stream` for the framing and its
// size cap); the peer reads the stream it accepted.
//
// The first resident is the oversize turn: a turn too large to ever fit a
// datagram cannot ride redundancy (no bundle could carry it), so it travels
// here — same `Payload`, same `(slot, seq)` identity, folded back into the
// per-slot ordered stream on arrival exactly as if a datagram had delivered
// it. QUIC's stream reliability replaces the redundancy/ack machinery for
// these: nothing to re-carry, nothing to retire. The head-of-line blocking a
// reliable stream brings is confined to the rare oversize turn that chose it.
//
// A oneof so chat/resync/lobby-control can join later without a wire break: a
// frame whose kind a peer predates decodes with the oneof unset, and the
// reader skips it rather than tearing the stream down.
message ControlFrame {
  oneof kind {
    // A turn too large for the datagram path, validated and forwarded like
    // any other turn. Client → relay carries the client's own turn; relay →
    // client carries a peer's forwarded turn (which may bear the envelope
    // stamps every forwarded turn can: frame annotation, buffer directive).
    Payload oversize_turn = 1;

    // A synced player-leave the relay pushes DOWN to a surviving client (relay →
    // client only). It rides the reliable stream, not the turn envelope, because
    // a drop stalls every survivor and stops the turn stream — so this is the
    // only channel that still reaches them. The relay sends one per surviving
    // client when it decides a leave; the client feeds it to its leave tracker
    // and applies it at `apply_at_frame`, clearing the departed slot and
    // unstalling. See `LeaveDirective`.
    LeaveDirective leave_directive = 2;

    // A client announcing its own clean departure UP to the relay (client →
    // relay only), sent after the client has flushed its final turns and is
    // about to disconnect. See `LeaveIntent`.
    LeaveIntent leave_intent = 3;

    // A client's end-of-game result report UP to the relay (client → relay
    // only). The bytes are opaque to the relay — it stamps arrival against its
    // own timeline and forwards the report up the coordinator pipeline without
    // parsing it. Unlike a leave intent, this rides out mid-game the moment the
    // game produces it, ahead of any final-turn drain. See `GameResult`.
    GameResult game_result = 4;

    // A native lobby setup/request command one session member authored, carried
    // between members before the game starts. Client → relay the `slot` is
    // IGNORED — the relay stamps the authenticated connection's slot, never a
    // client-asserted value. Relay → client the `slot` is relay-stamped and
    // authoritative, naming WHICH member authored the bytes so the receiving
    // game attributes them to that member's lobby turn. See `LobbyCommand`.
    LobbyCommand lobby_command = 5;

    // An in-game chat message one session member authored, carried between
    // members over the reliable stream rather than the datagram turn path: chat
    // has no simulated step to key a turn on, and unlike a lobby command it must
    // still flow mid-game, after the lobby channel has fallen silent. Client to
    // relay the `slot` is IGNORED -- the relay stamps the authenticated
    // connection's slot, never a client-asserted value, mirroring
    // `LobbyCommand`. Relay to client it is relay-stamped and authoritative,
    // naming WHICH member authored the text. See `GameChat`.
    GameChat game_chat = 6;

    // The session-start directive (relay → client only): every slot the
    // coordinator listed as expected has connected somewhere in the session's
    // mesh, so the game may begin. The relay fans it to every local slot over
    // the reliable stream the moment the session's authority relay observes full
    // presence, replacing the tenant app server's out-of-band start signal. The
    // client applies it idempotently -- the relay may deliver it more than once
    // (a re-push on a late/reconnecting slot, a duplicate across an authority
    // handoff). See `SessionStart`.
    SessionStart session_start = 7;

    // A slot's link-connectivity change (relay → client only): a session member
    // either lost its link (`connected` false) or (re)registered one
    // (`connected` true). Best-effort and purely informational — the relay fans
    // it to every local slot the moment it learns of the change, so a surviving
    // client can show a "player X disconnected" overlay ~instantly, while the
    // synced player-leave that actually removes the slot from lockstep is decided
    // separately (and, for a disconnect, only when a surviving member requests the
    // drop, never automatically). Carries no delivery guarantee beyond the reliable
    // stream's own, no ordering against the leave path, and no replay: a receiver
    // treats an unknown slot as a no-op and may ignore a pre-start frame entirely.
    // See `SlotConnectivity`.
    SlotConnectivity slot_connectivity = 8;

    // A surviving member's manual request that a disconnected slot be dropped
    // (client → relay only). A disconnection never removes a player on its own —
    // a dropped slot stalls the game in lockstep until a human decides to remove
    // it — so once a slot has been gone long enough, any single surviving member
    // may ask for it to be dropped, and the session's authority relay honors the
    // request only past an unlock floor. `slot` names the disconnected slot the
    // requester wants dropped. The requester itself is never carried up from the
    // client — the relay binds it to the authenticated connection the frame
    // arrived on, exactly as it stamps a `LobbyCommand` or `GameChat` author, so
    // a client cannot attribute a request to another member. Fire-and-forget:
    // there is no ack, the `LeaveDirective` that arrives when the drop is honored
    // is the only confirmation, and a refused request can simply be sent again.
    // See `RequestDrop`.
    RequestDrop request_drop = 9;
  }
}

// A relay-authored instruction to change the latency buffer at an agreed future
// game frame. The latency buffer is the lockstep cushion that absorbs network
// jitter; the deciding relay resizes it as conditions shift and every client
// must apply the change at the *same* simulated step, or they desync. This
// message is how that change reaches the clients: it rides the `Payload`
// envelope of turns the relay forwards (see `Payload.buffer_directive`), so it
// travels the turn stream clients already consume without a separate channel or
// a forged command.
//
// It is deliberately not a native latency command in the `commands` byte stream:
// those cap the buffer at the game's built-in range and would have to be forged
// into a specific slot's turn. Carried here instead, the buffer is a plain turn
// count with no ceiling, and the game applies it out of band — reading it off
// the turn it arrives on, not parsing it as a command.
message BufferDirective {
  // The latency buffer to apply, in whole turns of added dispatch delay. Not
  // capped at the game's native latency range: the deciding relay may widen the
  // cushion further when conditions demand it, and every client applies the same
  // count so lockstep stays in step.
  uint32 buffer_turns = 1;

  // The game frame at which every client applies `buffer_turns`. Chosen a
  // horizon ahead of the slowest frame the relay has observed — wide enough to
  // cover the spread between the slowest and fastest client plus delivery — so
  // the instruction reaches every client before that frame arrives. A client
  // that receives it for a frame already in its past applies nothing — the
  // change is moot by then, and the next decision will carry a fresh future
  // frame.
  uint32 apply_at_frame = 2;

  // Orders decisions within a session. The authority increments this for every
  // decision it broadcasts, so the turn stream's out-of-order delivery and
  // redundant re-carries can interleave a superseded directive's copies with
  // its replacement's without ambiguity. The client rule is: keep the
  // directive with the highest `decision_seq` seen so far, apply it at its
  // `apply_at_frame`, and ignore everything with a lower seq. On an EQUAL
  // seq, `authority_relay_id` below breaks the tie.
  uint32 decision_seq = 3;

  // The deciding relay's own id — the deterministic tie-break for two
  // directives that land on the same `decision_seq`. Each relay's
  // `decision_seq` count starts fresh from where it takes buffer authority,
  // so during the brief window where two relays can both believe they hold
  // it (an acknowledged staggered-handoff race, not a steady-state
  // condition), each can independently mint the same seq with a different
  // `buffer_turns` — without this field a client keeps whichever equal-seq
  // copy happens to arrive first, so two clients can converge on different
  // buffers. On an equal seq, the client keeps the directive with the
  // HIGHER `authority_relay_id` — deterministic, and needs no extra
  // coordination, since relay ids are already globally unique and known to
  // the deciding relay at stamp time. `optional` (rather than a plain
  // `uint64` defaulting to 0) so a directive from a relay running code that
  // predates this field is distinguishable from one that genuinely has id
  // 0: absent always loses a tie to a directive that sets it, so a
  // partially-upgraded fleet degrades no worse than the old arrival-order
  // tie-break, never worse.
  optional uint64 authority_relay_id = 4;
}

// A relay-authored instruction to apply a synced player-leave at an agreed
// future game frame. When a player leaves or drops, every remaining client must
// register the leave at the *same* simulated step, in the same per-slot order
// with the same synced-RNG state — including clients that never observed the
// drop locally — or the game desyncs. This message carries that agreement: the
// deciding relay picks the frame and **pushes it down each surviving client's
// reliable control stream** (see `ControlFrame.leave_directive`), because a drop
// stops the turn stream and only the reliable stream still reaches the survivors.
//
// The apply frame is chosen minimally — one past the departing slot's last
// observed frame — because remaining clients stall the instant that slot owes a
// turn it will never send, so the leave is what unstalls them, applied at the
// top of the receive step before the readiness check. Clients dedup by slot (a
// slot leaves once), so `leave_seq` only orders/labels leaves for the relay.
message LeaveDirective {
  // The slot that left. Relay-authoritative (the relay knows which client's link
  // ended, or validated a drop request), never a client-asserted value. Every
  // client writes this slot's native leave reason and stops requiring its turns.
  uint32 slot = 1;

  // The native SC:R `pending_leave_reason` value to write for the departing
  // slot: `0x40000006` == dropped (shows "player was dropped"), any other
  // nonzero == left (shows "player left"). Carried so every client shows the
  // same outcome; it does not affect determinism (all clients get the one value
  // the relay chose).
  uint32 reason = 2;

  // The game frame at which every client applies the leave. One past the
  // departing slot's last observed frame, so remaining clients apply it exactly
  // at the step they would otherwise stall waiting on that slot. A client cannot
  // advance past this frame without applying the leave — the departed slot gates
  // the step until then — so unlike a buffer change, a leave can never be "too
  // late," and there is no moot case.
  uint32 apply_at_frame = 3;

  // Orders and dedups leaves within a session, in a seq space *separate* from
  // `BufferDirective.decision_seq`. Because leaves are cumulative — one slot
  // leaving never obsoletes another slot's leave — this only dedups redundant
  // copies of the *same* leave (the relay stamps it onto many turns) and keeps
  // numbering continuous across an authority handoff so a promoted relay's
  // re-broadcast outranks stale copies. It never retires a *different* leave.
  uint32 leave_seq = 4;
}

// A client's announcement that it is leaving cleanly (client → relay only),
// sent on the reliable control stream after the client has flushed its final
// turns and before it disconnects. Deliberately fieldless: the relay already
// knows which slot is departing from the authenticated connection the frame
// arrived on, and the reason is implicitly "left" — a client that got this far
// wasn't dropped, it is announcing its own departure. On receipt the relay
// decides an immediate synced leave for that slot with the "left" reason (see
// `LeaveDirective`) and pushes it down every surviving client, rather than
// waiting for the link to go idle and reason it as "dropped". There is no ack:
// the client's confirmation that the relay processed this is the relay closing
// the link, not a reply frame.
message LeaveIntent {}

// A surviving member's manual request that the session drop a disconnected slot,
// carried client -> relay and then relay -> relay across the mesh. A
// disconnection is never resolved into a player removal on its own: a dropped
// slot stalls the game in lockstep until a human decides to remove it. Any
// single surviving member may make that decision by sending this -- naming the
// disconnected `slot` it wants dropped -- and the session's authority relay
// honors it only once that slot has been held undecided past an unlock floor, so
// a momentary blip cannot be turned into a permanent drop while a genuinely
// sustained disconnection can always be escaped.
//
// `requester` is relay-stamped, never client-asserted. On the client -> relay
// frame it is left unset: the relay binds the request to the authenticated
// connection's slot the frame arrived on, exactly as it stamps a `LobbyCommand`
// or `GameChat` author, so a client cannot attribute a request to another
// member. The origin relay stamps `requester` before it broadcasts the request
// across the mesh, where the field rides purely for logging and abuse
// attribution -- the honor decision keys only on `slot` and the authority
// relay's own hold state, never on who asked.
//
// Fire-and-forget: there is no ack frame. The `LeaveDirective` the authority
// broadcasts when it honors the request is the only confirmation, and a request
// that is refused -- sent before the unlock floor, or received by a relay that
// is not the session authority -- is simply dropped; the requester can send
// another.
message RequestDrop {
  // The disconnected slot the requester wants removed from the game. The relay
  // validates it against the slot's departure/hold state; a request naming a
  // slot that is not disconnected is ignored.
  uint32 slot = 1;

  // The slot that authored the request, relay-stamped at the origin's client
  // edge. Unset (0) on the client -> relay frame -- the relay never trusts a
  // client-asserted requester -- and meaningful only on the mesh-carried copy,
  // where it rides for logging and abuse attribution. The honor decision never
  // reads it.
  uint32 requester = 2;
}

// A client's end-of-game result report (client → relay only), sent on the
// reliable control stream. The relay never parses `payload`: it is the tenant's
// own serialized result, opaque here exactly as `external_ref` is an opaque
// correlation string. The relay validates only structurally (a size cap, one
// report per slot per session), stamps arrival against its own timeline, and
// forwards it up the coordinator pipeline. The reporting slot is the
// authenticated connection's slot, never a value carried in the bytes.
message GameResult {
  // The tenant's opaque serialized result. Bounded by the relay's own cap; a
  // payload over it is dropped without closing the link.
  bytes payload = 1;
}

// One native SC:R lobby command a session member authored, carried on the
// reliable control stream so every other member receives and applies it before
// the game starts. During setup the host's game generates the lobby's setup
// commands — slot and color assignments, the game-init that seeds the synced
// RNG — as bare command bytes, and every other member must apply that exact
// byte stream, in the exact order the host emitted it, or their pre-game state
// diverges before the first turn. Members also author their own small requests
// (a join, a ready toggle, a race change) that must reach the host and the
// other members. This is the lobby-phase counterpart to the datagram turn
// stream: once the game starts commands move to the datagram path, and this
// channel falls silent.
//
// It rides the reliable control stream, not a datagram, because a lobby has no
// lockstep turn clock to pace redundancy against and no frame to key a turn on
// — there is nothing to re-carry a lost setup command against and no later turn
// to fold it back into. QUIC's stream reliability carries it instead, exactly
// as an oversize turn chooses the stream because no bundle could re-carry it.
//
// `slot` names the member that authored the bytes, and its authority differs by
// direction, matching `GameResult`'s convention. Client → relay the field is
// IGNORED: the relay binds the command to the authenticated connection's slot,
// never a value the client asserts, so a client cannot forge another member's
// lobby command. Relay → client the field is relay-stamped and authoritative:
// the receiving game needs to know WHICH member authored the bytes to attribute
// them to that member's lobby turn, and a mesh copy carries the origin relay's
// stamp already (the origin stamps before the command ever leaves its client
// edge).
//
// Delivery is a per-session ordered log the relay replays to late arrivals, not
// a fire-and-forget fan-out, because setup runs while members are still dialing
// in with real clock skew: the host's lobby machine can emit its setup commands
// before a given member's link exists, and nothing back-pressures it (the
// host's local turn barrier is already satisfied). So the relay appends every
// lobby command it delivers to a per-session log and, when a member's control
// stream comes up after commands already flowed, replays the log to that member
// in arrival order before it begins tailing live commands — every member ends
// up with the identical ordered sequence regardless of when it joined. A member
// never receives its own authored command back (the relay never echoes to the
// author; the game applies its own locally), and the replay/live handoff is
// exact: each command reaches a member exactly once, in order.
message LobbyCommand {
  // The session slot that authored the command bytes. Client → relay this is
  // ignored and the relay overwrites it with the authenticated connection's
  // slot; relay → client it is the relay-stamped, authoritative author, so the
  // receiving game attributes the bytes to that member's lobby turn.
  uint32 slot = 1;

  // The opaque native SC:R lobby command bytes, carried verbatim. The relay
  // frames nothing of its own around them beyond this message and forwards them
  // byte-for-byte — like a `GameResult` payload, they are the game's own bytes,
  // not something the relay parses. Bounded by the control frame's size cap;
  // lobby commands are tens of bytes in practice.
  bytes payload = 2;
}

// One in-game chat message a session member authored, carried on the reliable
// control stream so every other member receives it before the game's in-game
// chat UI shows it. Unlike `LobbyCommand`, this is the channel's *mid-game*
// counterpart: it stays live once the game starts and the lobby channel falls
// silent, and it carries a small amount of structure -- a scope hint -- rather
// than opaque bytes.
//
// It rides the reliable control stream, not a datagram, for the same reason an
// oversize turn and a lobby command do: chat has no simulated step to key a
// turn on and no later turn to fold a lost message back into, so there is
// nothing for the datagram path's redundancy to re-carry it against. QUIC's
// stream reliability delivers it instead.
//
// `slot` names the member that authored the message, with the same
// direction-dependent authority as `LobbyCommand` and `GameResult`: client to
// relay the field is IGNORED (the relay binds it to the authenticated
// connection's slot, never a client-asserted value, so a client cannot forge a
// message from another member); relay to client it is relay-stamped and
// authoritative; and a mesh copy already carries the origin relay's stamp,
// applied before the message ever left its client edge.
//
// Delivery is a bare fan-out, not an ordered replay log like `LobbyCommand`'s:
// chat is ephemeral, so a member whose control stream comes up after a message
// already flowed simply never sees it -- there is no pre-game setup state a
// missed message could leave incomplete, so there is nothing worth replaying.
// The relay does not echo a message back to its own author (the sender's own
// chat UI echoes locally) and fans a client-authored message to every other
// local member plus every peer relay serving the session; a mesh-received
// message is fanned to this relay's local members only (not re-broadcast
// across the mesh -- the origin already sent a copy to every link serving the
// session).
//
// The relay also enforces two caps on a client-authored message before
// forwarding it: `text` may not exceed the control frame's opaque-payload
// convention (rejected, not truncated, past a size cap far more generous than
// any real chat line), and an authoring slot is rate-limited (a token bucket
// allowing short bursts) so a misbehaving client cannot flood the channel. Both
// caps drop the offending frame without closing the connection -- a chat
// message is not correctness-critical the way a turn or a lobby command is, so
// losing one costs nothing more than a dropped line.
message GameChat {
  // The session slot that authored the message. Client → relay this is ignored
  // and the relay overwrites it with the authenticated connection's slot; relay
  // → client it is the relay-stamped, authoritative author, so the receiving
  // game attributes the text to that member's chat line.
  uint32 slot = 1;

  // A scope hint for which members should display this message: 0 = all, 1 =
  // allies (of the author), 2 = observers, 3 = a single named player (see
  // `target_slot`). The relay does NOT interpret this field -- it fans the
  // message out to every other local member and across the mesh regardless of
  // scope, and each receiving client decides locally whether to display the
  // line. This mirrors native SC:R's own channel-based chat, where scope
  // filtering has always been receiver-side: a modified client can already
  // choose to display every channel it receives, so server-side filtering
  // would add complexity without closing a real trust boundary. The relay
  // carries the hint verbatim in both directions and across a mesh hop.
  uint32 target_kind = 2;

  // The recipient slot a `target_kind` of 3 (a single named player) names.
  // Meaningless for every other `target_kind` and left at 0 in that case,
  // exactly as `Payload.game_frame_count`'s absence-vs-zero distinction is
  // drawn elsewhere with an `optional` field -- but here 0 is always a valid
  // "unused" sentinel because a `target_kind` other than 3 makes the receiving
  // client ignore this field entirely, so no ambiguity with a real slot 0
  // arises. Carried verbatim like `target_kind`; the relay never reads it.
  uint32 target_slot = 3;

  // The chat line's text, UTF-8, carried verbatim. Bounded by the relay's own
  // size cap (well under the control frame's own cap) -- an over-cap message is
  // dropped, not truncated, so no member ever sees a different message than the
  // one another member sent by seeing a silently shortened copy of it.
  string text = 4;
}

// One message on the relay ↔ relay reliable mesh control stream — the channel a
// relay-pair uses for what its datagram path cannot carry: synced player-leave
// propagation and oversize-turn divert. Each mesh link carries one
// bidirectional QUIC stream on which both relays write length-prefixed
// `MeshControlFrame`s (same framing and size cap as `ControlFrame`; see
// `proto::control_stream`) and read the peer's.
//
// A leave that a relay's own home client triggers must reach the *other* relays'
// local survivors too — a drop stalls every player in the game, including those
// on peer relays — and it must reach the session's decision authority so it can
// author the one synced `LeaveDirective` every client applies at the same frame.
// The datagram path cannot carry that: a drop stops the turn stream the datagram
// sidecars ride. So it rides this reliable stream, like presence does. An
// oversize turn rides here for the same reason it rides the client-edge control
// stream: no datagram bundle could ever carry (or re-carry) it.
//
// A oneof so more relay ↔ relay control kinds can join later without a wire
// break: a frame whose kind a peer predates decodes with the oneof unset, and the
// reader skips it rather than tearing the stream down. An unset kind is also the
// empty stream-establishment/keepalive frame the dialer writes right after
// opening the stream so the acceptor's `accept_bi` completes promptly (QUIC does
// not surface an opened bidirectional stream to the peer until its opener writes).
message MeshControlFrame {
  // The game this frame belongs to, scoped within the tenant the mesh link
  // authenticated for — exactly like `MeshPacket.session`. A `0` is malformed
  // (sessions are 1-indexed) and the receiver skips it; it is also the value the
  // empty establishment frame carries, so a zero-session frame is always
  // ignorable. The receiver resolves the bare id to a tenant-scoped key through
  // the same per-link joined-sessions state the datagram path uses.
  uint64 session = 1;

  oneof kind {
    // A home client of the sending relay departed the game. Every relay records
    // the departure (for authority-handoff robustness); the session's decision
    // authority additionally authors the synced `LeaveDirective` from it. The
    // receiving authority dedups by slot, so a duplicate `SlotDeparted` (e.g. a
    // re-announce on a redialed link) never double-decides.
    SlotDeparted slot_departed = 2;

    // A synced player-leave the session's authority authored, propagated to the
    // other relays so each pushes it down its own local survivors' reliable
    // control streams. A relay that receives this caches it (dedup by slot) and
    // fans it out to its local clients; it does not re-broadcast it across the
    // mesh, so there is no echo. See `LeaveDirective`.
    LeaveDirective leave_directive = 3;

    // A turn too large for any mesh datagram, diverted here by the relay whose
    // home client produced it — the same `Payload`, same `(slot, seq)` identity
    // as the client-edge `ControlFrame.oversize_turn`, validated at the origin's
    // client edge like every mesh-carried turn. The receiver folds it back into
    // its normal turn path (topological dedup, then local fan-out) but does not
    // re-broadcast it to other mesh links: the origin relay already diverted a
    // copy to every link serving the session, so re-flooding would only echo.
    Payload oversize_turn = 4;

    // A lobby command one member authored, propagated to the other relays so
    // each fans it out to its own local members. The origin relay stamps the
    // authoring `slot` onto the `LobbyCommand` before it ever leaves that relay's
    // client edge, so a mesh copy already carries the authoritative slot. A relay
    // that receives this appends it to its own per-session lobby log — so its
    // late-dialing local members still get it on replay — and fans it out to its
    // local members, but does not re-broadcast it across the mesh: the origin
    // already sent a copy to every link serving the session, so re-flooding would
    // only echo (mirroring the oversize-turn divert). See `LobbyCommand`.
    LobbyCommand lobby_command = 5;

    // A game-chat message one member authored, propagated to the other relays
    // so each fans it out to its own local members. The origin relay stamps the
    // authoring `slot` before the message ever leaves that relay's client edge,
    // so a mesh copy already carries the authoritative slot. A relay that
    // receives this fans it out to its local members, but appends it to no log
    // (chat is ephemeral, unlike a lobby command) and does not re-broadcast it
    // across the mesh: the origin already sent a copy to every link serving the
    // session, so re-flooding would only echo. See `GameChat`.
    GameChat game_chat = 6;

    // One of the sending relay's home clients registered for the session — a
    // slot-presence announcement. Every relay accumulates the reported slots
    // into a per-session live-slot set; the session's authority relay fires the
    // one `SessionStart` once that set covers the descriptor's expected slots. A
    // duplicate (a re-announce on a redialed link) is idempotent — the set is a
    // set. See `SlotPresent`.
    SlotPresent slot_present = 7;

    // The session-start directive the authority decided, propagated to the other
    // relays so each fans it down its own local slots. A relay that receives this
    // latches the session started (so its own late-registering slots still get
    // it) and fans it to its local slots; it does not re-broadcast it across the
    // mesh — the authority already sent it to every relay — so there is no echo.
    // See `SessionStart`.
    SessionStart session_start = 8;

    // A slot's link-connectivity change one relay observed on its own home
    // client, propagated so every relay can inform its local slots. The origin
    // relay broadcasts it the moment a home client's link dies (`connected`
    // false) or (re)registers (`connected` true); a relay that receives this fans
    // it to its own local slots and does NOT re-broadcast it across the mesh (the
    // origin already sent a copy to every peer, so re-flooding would only echo).
    // Best-effort and informational, exactly like its client-edge sibling — no
    // log, no delivery guarantee beyond the reliable stream, unknown slots are
    // no-ops. See `SlotConnectivity`.
    SlotConnectivity slot_connectivity = 9;

    // A manual drop request one relay's surviving member authored, propagated so
    // the session's authority relay -- which may be a peer, not the origin -- can
    // honor it. The origin relay stamps the authoring `requester` slot onto the
    // `RequestDrop` before it leaves that relay's client edge (for logging and
    // abuse attribution), then broadcasts it to every peer. A relay that receives
    // this acts on it only if it is the session authority and the target slot's
    // drop is past the unlock floor; it does NOT re-broadcast it -- the origin
    // already sent a copy to every peer, so re-flooding would only echo, the same
    // no-echo rule `SlotDeparted` and `GameChat` follow. See `RequestDrop`.
    RequestDrop request_drop = 10;

    // One destination client's end-to-end delivered-through cursors, shipped by
    // its home relay to the session's other relays so the authority can track
    // FINAL delivery (origin turns reaching the destination client) rather than
    // only per-link acks. The cursors are the ones the destination itself pushes
    // up its ack-beacon stream -- client-claimed truth, re-shared, never
    // measured anew. Declarative: each frame carries the destination's complete
    // per-origin cursor map, so a single frame fully (re)syncs a fresh or
    // reconnected link and a lost frame is corrected by the next one.
    // Push-on-advance with a per-destination minimum interval, so it stays off
    // the hot path's budget. A relay that receives this does NOT re-broadcast
    // it -- the home relay sent a copy to every session peer, the same no-echo
    // rule the other kinds follow.
    DeliveryCursors delivery_cursors = 11;

    // One relay's per-session resume cursors for the mesh datagram path: for
    // each origin slot this session has ever forwarded a turn for, the next
    // seq this relay's forward-gate still needs. Sent once by each side after
    // its link (re)establishes and Join/reconcile completes -- turns flow
    // both directions on a pair, so each side answers for itself, never for
    // the peer. The receiver replays only turns that originated at ITS OWN
    // client edge -- never a turn it itself received from the mesh -- so a
    // reply can never echo something back onto the mesh. Not re-broadcast:
    // each side answers only the peer that asked.
    //
    // An origin slot absent from `cursors` means one of two things, told
    // apart by `resuming`:
    //
    // - `resuming` false: a session this relay has no forward-gate history
    //   for at all (a first Join, or one that predates this link entirely) --
    //   the absent slot asks for NO replay. A peer with nothing recorded yet
    //   wants only new turns, not a backfill (a newly-added relay's own
    //   clients get their backfill from their own client-side reconnect, not
    //   from a mesh peer).
    // - `resuming` true: this relay DOES have forward-gate history for the
    //   session (evidence of prior mesh exchange), so an absent slot is not
    //   "unknown" -- it is a slot this relay's own gap-tracking never formed a
    //   contiguous prefix for (nothing arrived yet, or what did arrived with
    //   a gap below it -- the exact shape a mesh-side death with no other
    //   re-carrier leaves behind, unlike a client's own inbound gaps, which
    //   its home relay's live link redundancy would otherwise catch). The
    //   receiver replays that slot's turns from the very start; the asker's
    //   own dedup absorbs any overlap with whatever sparse, out-of-order
    //   turns it already has.
    //
    // The one gap this does not close: a session with NO forward-gate history
    // on EITHER side of a link death (nothing from any path ever reached this
    // relay for it) still reads as a first join (`resuming` false) and asks
    // for nothing, so turns produced and lost in that narrow pre-history
    // window are not recovered. Bounded to session start and the
    // abandoned/stall machinery's own timers, not indefinite.
    MeshResumeCursors mesh_resume_cursors = 12;

    // The sending relay's per-slot delivered-through cursors for THIS mesh
    // link's own datagram transport -- the mesh-link counterpart of the
    // client-edge ack-beacon. Each cursor is the top of the contiguous run of
    // turns this relay's link-level transport has received from the peer for
    // one slot; the peer force-advances that slot's unacked window past it,
    // exactly as `Link::retire_through` does for a client-edge link. Carried
    // on this stream (rather than a dedicated uni-stream, as the client edge
    // uses) because one mesh connection multiplexes many sessions' transport
    // state behind a single QUIC datagram path -- this frame's `session`
    // field is what a bare per-slot cursor cannot supply on its own. Declared
    // over reverse-path acks specifically: it rescues a window that is stuck
    // only because the peer's acks were lost, not one stuck by a genuine
    // forward gap (the peer truly hasn't received the turns) -- that case is
    // the hard cap's job, not this frame's. Push-on-advance, like every other
    // cursor share here. Not re-broadcast -- each side answers only for its
    // own receive state.
    MeshAckCursors mesh_ack_cursors = 13;
  }
}

// One destination client's end-to-end delivered-through cursors: for each
// origin slot, the highest turn seq the destination has confirmed received
// (via its ack-beacon stream to its home relay). See
// `MeshControlFrame.delivery_cursors` for the sharing discipline.
message DeliveryCursors {
  // The destination slot these cursors describe -- a home client of the
  // sending relay.
  uint32 dest_slot = 1;

  // The destination's per-origin delivered-through cursors, complete as of
  // this frame.
  repeated DeliveryCursor cursors = 2;
}

// One origin's delivered-through cursor within a `DeliveryCursors` frame.
message DeliveryCursor {
  // The origin slot whose turns the cursor covers.
  uint32 origin_slot = 1;

  // The highest origin seq the destination has confirmed received. Monotonic
  // per (destination, origin): a receiver ignores a regressing value.
  uint64 delivered_seq = 2;
}

// One relay's per-session resume cursors for the mesh datagram path. See
// `MeshControlFrame.mesh_resume_cursors` for the sharing discipline and the
// two `resuming`-dependent meanings an absent slot carries.
message MeshResumeCursors {
  // The sender's per-origin-slot resume cursors, complete as of this frame.
  repeated MeshResumeCursor cursors = 1;

  // Whether the sender has ANY forward-gate history for this session --
  // whether its `cursors` above came from a session it has actually
  // exchanged mesh traffic for, not a session it is joining fresh. Decides
  // what an origin slot absent from `cursors` means: nothing (a fresh join)
  // when false, everything-from-the-start (a real gap this relay's own
  // gap-tracking never closed) when true. Defaults to `false` on the wire, so
  // a peer that predates this field is read as never resuming -- the
  // conservative, no-replay reading.
  bool resuming = 2;
}

// One origin slot's resume cursor within a `MeshResumeCursors` frame.
message MeshResumeCursor {
  // The origin slot this cursor covers.
  uint32 origin_slot = 1;

  // The next seq the sender's forward-gate still needs from `origin_slot`.
  // Every earlier seq has already reached the sender's locals by some path --
  // this link, another mesh link, or, if `origin_slot` is the sender's own
  // client, the client edge itself -- and must not be replayed again.
  uint64 next_seq = 2;
}

// One relay's per-slot delivered-through cursors for one mesh link's own
// datagram transport. See `MeshControlFrame.mesh_ack_cursors` for the sharing
// discipline.
message MeshAckCursors {
  // The sender's per-slot cursors, complete as of this frame (declarative,
  // like `MeshResumeCursors` -- a lost frame is corrected by the next one).
  repeated MeshAckCursor cursors = 1;
}

// One slot's delivered-through cursor within a `MeshAckCursors` frame.
message MeshAckCursor {
  // The slot this cursor covers.
  uint32 slot = 1;

  // The top of the contiguous run of turns this relay's mesh-link transport
  // has received from the peer for `slot`. Monotonic per (link, slot); the
  // receiver's `retire_through` guard rejects a non-advancing value.
  uint64 delivered_through = 2;
}

// A relay's announcement to its mesh peers that one of its home clients has
// departed the game (its link ended, or it sent a clean leave-intent). Carried
// in a `MeshControlFrame`. Every relay records the departure so a later
// authority promotion can re-derive the leave; the current authority turns it
// into the one synced `LeaveDirective` all clients apply.
message SlotDeparted {
  // The slot that departed, authoritative at its home relay (never a
  // client-asserted value — the home relay knows which connection ended).
  uint32 slot = 1;

  // The departing slot's last observed game frame at its home relay — the basis
  // for the leave's apply frame (`last_frame + 1`; the authority falls back to
  // its session frame only when this is absent, never to a max of the two —
  // survivors' stamped frames run ahead of the departed slot's before they
  // stall, so a max could schedule the leave past the frame stalled survivors
  // are pinned at). Absent when the slot never produced a framed turn (a
  // lobby/pre-game departure, which the game handles natively): there is no
  // frame basis, matching how the decision authority holds a leave with no
  // frame to schedule against. A present `0` is a valid in-game frame, so the
  // field is `optional` rather than defaulting to 0 — the same distinction
  // `Payload.game_frame_count` draws.
  optional uint32 last_frame = 2;

  // The native SC:R `pending_leave_reason` value the departure carries
  // (`0x40000006` == dropped, else left), so the authority authors the leave with
  // the reason the home relay observed. See `LeaveDirective.reason`.
  uint32 reason = 3;

  // The reachability ceiling for the leave's apply frame: the highest game frame
  // every *surviving* slot has provably executed, computed by the departing
  // slot's home relay from its own view of the survivors' framed turns (counted
  // in turns, not frames — a turn stamped `frame` is provably executed once the
  // session advanced `buffer_max` turns past it). The authority clamps
  // `apply_at_frame = min(last_frame, reachable_frame) + 1`, so a client that
  // inflates its own `game_frame_count` before leaving cannot schedule the leave
  // past a frame the survivors can reach (which would strand them). Home-authored
  // and carried verbatim so every relay — including one promoted mid-handoff —
  // derives the identical clamped apply frame from the shared departure record.
  // Absent when no surviving slot has framed history yet (lobby / the game's very
  // first turns), in which case the authority applies no clamp — matching the
  // held/`last_frame`-only path. A present `0` is a valid ceiling, so the field
  // is `optional`, like `last_frame`.
  optional uint32 reachable_frame = 4;

  // The end-of-game result the departing slot reported before it departed, if
  // any. Home-authored: only the departing slot's home relay fills these — it
  // received the report on that client's control stream and retained it — and
  // every relay folds the identical result into its departure record
  // (first-non-empty wins, exactly like `reachable_frame`). A result can never
  // be recorded after its slot's departure (reports ride only the live link, and
  // the serve loop closes at the intent/link death), so an embedded result is
  // final. Empty `result_payload` means the slot departed without ever reporting
  // — a real report is never zero bytes — so the payload's presence gates the
  // whole echo, and the three stamps below are meaningless without it.
  bytes result_payload = 5;

  // Relay wall-clock (unix epoch milliseconds) when the home relay received the
  // result report. `0` when there is no result (empty `result_payload`).
  uint64 result_arrival_ms = 6;

  // The session's consensus frame (the slowest slot's observed frame) when the
  // result arrived. Absent when there is no result, or the report predated any
  // framed turn — the same distinction `last_frame` draws.
  optional uint32 result_session_frame = 7;

  // The reporting slot's own newest observed frame when the result arrived.
  // Absent when there is no result, or the report predated any framed turn.
  optional uint32 result_slot_frame = 8;
}

// A relay's directive that a session may begin: every slot the coordinator
// listed in `SessionDescriptor.expected_slots` (its players and observers) has
// connected to some relay serving the session. The session's authority relay is
// the one component that observes every client's dial + authentication — its own
// registrations plus its peers' `SlotPresent` announcements — so it authors this
// once the accumulated live-slot set covers the expected set, and it is fanned
// to every client over the reliable control stream, replacing the tenant app
// server's out-of-band start signal.
//
// It also carries the session's computed initial latency-buffer depth in
// `initial_buffer_turns` when the authoring authority sized one: that relay
// accumulates its home clients' pre-start link stats, runs the buffer control
// law's target over them (folded with a session-create latency hint and a
// mesh-hop cushion), clamps to the session bounds, and stamps the result here so
// the game starts at the right depth from frame 0 instead of the tenant minimum.
// The field is absent when the authoring relay sized no depth — an authority
// that predates the field, or a resumed (re-home) relay re-pushing into an
// already-running game, where a stale initial depth must never resize the live
// buffer — and the receiver then keeps whatever buffer it already seeded.
//
// Identity is the connection (on the client edge) or the framed session id (on
// the mesh). Delivered at least once — a late or reconnecting slot is re-pushed
// on register, and an authority handoff can re-fire — so the client dedups
// (applying it a second time is a no-op) and applies the depth only in its
// single pre-start step, so a redundant re-delivery never resizes a running game.
message SessionStart {
  // The computed initial latency-buffer depth, in whole turns, or absent when
  // the authoring relay sized none (an authority that predates the field, or a
  // resumed re-home re-push into a running game). `optional` (not a `0` default)
  // so "no depth, keep the seeded buffer" stays distinct from a genuine 0-turn
  // depth — the same absence-vs-zero distinction `Payload.game_frame_count`
  // draws. Old peers skip this unknown field, exactly as they do
  // `BufferDirective.authority_relay_id`.
  optional uint32 initial_buffer_turns = 1;
}

// A relay's announcement to its mesh peers that one of its home clients has
// registered for the session — its authenticated connection joined the relay's
// roster. Carried in a `MeshControlFrame`. Every relay accumulates the reported
// slots into a per-session live-slot set; the session's authority relay turns
// full coverage of the descriptor's expected slots into the one `SessionStart`.
// A duplicate (a re-announce on a redialed link) is idempotent — the accumulated
// set is a set.
message SlotPresent {
  // The slot that registered, authoritative at its home relay (never a
  // client-asserted value — the home relay binds it to the authenticated
  // connection's token slot).
  uint32 slot = 1;
}

// A slot's link-connectivity change: a session member's link to a relay either
// died or came up. It rides the client-edge `ControlFrame` (relay → the local
// slots) and the relay ↔ relay `MeshControlFrame` (origin relay → its peers, so
// every relay can inform its own local slots). Purely informational: it lets a
// surviving client show WHO disconnected the instant the link dies — well before
// the synced player-leave that actually removes the slot from lockstep, which is
// decided separately and, for a disconnect, only when a surviving member requests
// the drop, never automatically.
//
// Best-effort by design. There is no replay log and no delivery guarantee beyond
// the reliable stream it rides: a client whose stream comes up after a change
// simply never sees that change, exactly like `GameChat`. A receiver treats a
// slot it does not recognize as a no-op, and may ignore a frame that arrives
// before the session has started (a `connected` true at initial dial is such a
// pre-start frame). The frame carries no game frame and keys nothing on
// determinism — every client acting on it or ignoring it stays in lockstep,
// because the leave that changes simulation state is the separate, synced one.
message SlotConnectivity {
  // The slot whose connectivity changed, authoritative at its home relay (never
  // a client-asserted value — the home relay knows which connection died or
  // registered). A receiver that does not recognize the slot ignores the frame.
  uint32 slot = 1;

  // The new connectivity: `false` when the slot's link died (a deregister
  // without a clean leave — a disconnect), `true` when the slot registered a
  // link (its initial dial, or a future re-register). A slot can flip more than
  // once over a game; the newest frame reflects the current state, and there is
  // no ordering guarantee against the synced-leave path, so a client uses this
  // only for its own connectivity display.
  bool connected = 2;
}
