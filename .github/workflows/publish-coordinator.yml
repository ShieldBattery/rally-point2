name: Publish coordinator image

# Every commit on main gets an image at ghcr.io/shieldbattery/rp2-coordinator
# tagged with its full SHA (plus a moving `latest`), so a deployment pins a tag
# exactly the way a Cargo git dependency pins a rev — and a rollback is a tag
# flip, not a rebuild. Authentication is the workflow's own GITHUB_TOKEN: no
# stored registry credential exists. For tamper-evident production pinning,
# prefer the image *digest* printed by this run over the SHA tag (tags are
# mutable on every registry; digests are not).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-coordinator-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: build + push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: coordinator/Dockerfile
          push: true
          tags: |
            ghcr.io/shieldbattery/rp2-coordinator:${{ github.sha }}
            ghcr.io/shieldbattery/rp2-coordinator:latest
          # Links the package to this repository on ghcr.
          labels: |
            org.opencontainers.image.source=https://github.com/ShieldBattery/rally-point2
          cache-from: type=gha
          cache-to: type=gha,mode=max
