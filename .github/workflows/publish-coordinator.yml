name: Publish coordinator image

# Every commit on main gets a Docker Hub image tagged with its full SHA (plus a
# moving `latest`), so a deployment pins `shieldbattery/rp2-coordinator:<sha>`
# exactly the way a Cargo git dependency pins a rev — and a rollback is a tag
# flip, not a rebuild.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-coordinator-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: build + push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: coordinator/Dockerfile
          push: true
          tags: |
            shieldbattery/rp2-coordinator:${{ github.sha }}
            shieldbattery/rp2-coordinator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
