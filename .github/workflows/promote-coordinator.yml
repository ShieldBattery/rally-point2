name: Promote coordinator image to stable

# Retags an already-published ghcr.io/shieldbattery/rp2-coordinator image as
# `stable` — the tag deployed boxes track, so an upgrade there is just
# `docker-compose pull && up -d`. This RETAGS rather than rebuilds: the digest
# stays identical, so the image that was tested is bit-for-bit the image
# promoted. Run it manually with the full commit SHA whose image should become
# stable.
on:
  workflow_dispatch:
    inputs:
      sha:
        description: Full commit SHA of the image to promote (its per-commit tag must exist)
        required: true
        type: string

# One promotion at a time: two concurrent runs would race their retags and
# leave `stable` on whichever finished last, not whichever was intended.
concurrency:
  group: promote-coordinator

jobs:
  promote:
    name: retag as stable
    runs-on: ubuntu-latest
    permissions:
      packages: write
    # The sha input reaches shell commands below, so it rides an env var and
    # is validated first — a workflow_dispatch input is attacker-influenced
    # text as far as a `run:` block is concerned, and direct `${{ }}`
    # interpolation into a script would execute any metacharacters it
    # carries under this job's `packages: write` token.
    env:
      SHA: ${{ inputs.sha }}
    steps:
      - name: Validate sha input
        run: |
          set -euo pipefail
          if ! printf '%s' "${SHA}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::input must be a full 40-char lowercase commit sha"
            exit 1
          fi
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Retag
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag ghcr.io/shieldbattery/rp2-coordinator:stable \
            "ghcr.io/shieldbattery/rp2-coordinator:${SHA}"
      - name: Show promoted digest
        run: docker buildx imagetools inspect ghcr.io/shieldbattery/rp2-coordinator:stable
